{% extends 'shop/base.html' %}

{% block title %}Удаление товара{% endblock %}

{% block content %}
<h1 class="mb-4 text-danger">Удаление товара</h1>

<div class="card p-4 shadow-sm">
    <p>Вы действительно хотите удалить товар <strong>{{ product.name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'product_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
