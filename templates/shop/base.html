<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Каталог товаров{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'product_list' %}">Каталог товаров</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'product_list' %}">Товары</a>
                <a class="nav-link" href="{% url 'category_list' %}">Категории</a>
                <a class="nav-link" href="{% url 'analytics' %}">Аналитика</a>
                <a class="nav-link" href="{% url 'create_product' %}">+ Товар</a>
                <a class="nav-link" href="{% url 'create_category' %}">+ Категория</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
