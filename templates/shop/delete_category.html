{% extends 'shop/base.html' %}

{% block title %}Удаление категории{% endblock %}

{% block content %}
<h1 class="mb-4 text-danger">Удаление категории</h1>

<div class="card p-4 shadow-sm">
    <p>Вы действительно хотите удалить категорию <strong>{{ category.name }}</strong>?</p>
    <p class="text-muted">Если в категории есть товары, они тоже удалятся.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'category_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
